name: Android Build (APK + AAB)

# Builds a signed release APK and AAB for Wiggle Word Farm.
# Targets Android API 35 (Build Tools 35.0.0) for Google Play compatibility.
# No emulator smoke-test here; launch verification is a local pre-release step
# documented in the README.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependencies
        run: npx expo install --fix

      - name: Run Expo Doctor
        run: npx expo-doctor || true

      - name: Check Expo dependency versions
        run: npx expo install --check || true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 + Build Tools 35.0.0
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Prebuild Android project (native)
        run: npx expo prebuild --platform android --no-install

      - name: Inject release signing config
        run: node scripts/apply-android-signing.js

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -PWIGGLE_UPLOAD_STORE_FILE=release.keystore \
            -PWIGGLE_UPLOAD_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PWIGGLE_UPLOAD_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PWIGGLE_UPLOAD_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -PWIGGLE_UPLOAD_STORE_FILE=release.keystore \
            -PWIGGLE_UPLOAD_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PWIGGLE_UPLOAD_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PWIGGLE_UPLOAD_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Rename artifacts
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/wiggle-word-farm-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab dist/wiggle-word-farm-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wiggle-word-farm-release-apk
          path: dist/wiggle-word-farm-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: wiggle-word-farm-release-aab
          path: dist/wiggle-word-farm-release.aab
