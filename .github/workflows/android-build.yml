name: Android Build (APK + AAB)

# Builds a signed release APK and AAB for Wiggle Word Farm.
# Targets Android API 35 (Build Tools 35.0.0) for Google Play compatibility.
# No emulator smoke-test here; launch verification is a local pre-release step
# documented in the README.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependencies
        run: npx expo install --fix

      - name: Run Expo Doctor
        run: npx expo-doctor || true

      - name: Check Expo dependency versions
        run: npx expo install --check || true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 + Build Tools 35.0.0
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Prebuild Android project (native)
        run: npx expo prebuild --platform android --no-install

      - name: Increase Gradle memory (avoid OOM on CI runners)
        run: |
          # Expo's default heap (2 GB) can OOM during release dependency
          # collection on free runners. Raise it; the last value in
          # gradle.properties wins, so appending overrides the default.
          {
            echo ""
            echo "org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
            echo "org.gradle.parallel=false"
            echo "org.gradle.workers.max=2"
          } >> android/gradle.properties

      - name: Inject release signing config
        run: node scripts/apply-android-signing.js

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Strip any stray whitespace/newlines the secret may have picked up,
          # then base64-decode into the keystore file.
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > android/app/release.keystore
          # Fail early with a clear message if the result is not a valid keystore.
          if [ ! -s android/app/release.keystore ]; then
            echo "::error::Decoded keystore is empty. The ANDROID_KEYSTORE_BASE64 secret is missing or corrupted."
            exit 1
          fi
          if ! keytool -list -keystore android/app/release.keystore -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >/dev/null 2>&1; then
            echo "::error::Keystore failed to open. The ANDROID_KEYSTORE_BASE64 value is corrupted or the password is wrong. Re-enter the secret."
            exit 1
          fi
          echo "Keystore decoded and verified successfully."

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -PWIGGLE_UPLOAD_STORE_FILE=release.keystore \
            -PWIGGLE_UPLOAD_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PWIGGLE_UPLOAD_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PWIGGLE_UPLOAD_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -PWIGGLE_UPLOAD_STORE_FILE=release.keystore \
            -PWIGGLE_UPLOAD_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PWIGGLE_UPLOAD_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PWIGGLE_UPLOAD_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Rename artifacts
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/wiggle-word-farm-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab dist/wiggle-word-farm-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wiggle-word-farm-release-apk
          path: dist/wiggle-word-farm-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: wiggle-word-farm-release-aab
          path: dist/wiggle-word-farm-release.aab
